<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAF Catalog</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0f0f12;
  color:#fff;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-direction:row-reverse;
  z-index:999;
}

.logo img{
  height:40px;
  opacity:.9;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}
.hero img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:55% center;
  filter:brightness(.85);
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0f0f12 15%,transparent);
}
.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:60px;
}
.hero h1{
  font-size:56px;
  margin:0;
}
.hero p{
  color:#aaa;
  font-size:18px;
}

/* SECTION */
.section{
  padding:80px 60px;
  max-width:1200px;
  margin:auto;
}
h2{
  margin-bottom:30px;
  font-size:28px;
}

/* MARKET GRID */
.market-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

/* CARD */
.unit-card{
  position:relative;
  background:#14141b;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}
.unit-card:hover{
  transform:translateY(-6px);
}

/* LOCKED PORTRAIT */
.unit-img{
  width:100%;
  aspect-ratio: 9 / 16;
  overflow:hidden;
  position:relative;
}

.unit-img img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:50% center;
}

/* Overlay */
.unit-overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:16px;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

.unit-overlay h3{
  margin:0;
}

.unit-overlay p{
  margin:4px 0 0;
  color:#aaa;
  font-size:14px;
}

/* MOBILE */
@media(max-width:800px){
  .section{padding:60px 25px;}
  .hero-content{padding:40px 25px;}
  .hero h1{font-size:40px;}
}
.search-box{
  margin-bottom:25px;
}

.search-box input{
  width:100%;
  padding:14px 18px;
  border-radius:12px;
  border:none;
  background:#1b1b24;
  color:white;
  font-size:15px;
  outline:none;
  transition:.2s;
}

.search-box input:focus{
  background:#22222c;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="iaf-logo.png">
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <img src="img/pic/Nop.png">
  <div class="hero-content">
    <h1>IAF Furru Presonel</h1>
    <p>Furru Project | if ai can be a friend</p>
  </div>
</section>

<!-- MARKET -->
<section class="section">

  <div class="search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search unit name / model / SN..."
      oninput="filterUnits()"
    >
  </div>

  <h2>All Units</h2>
  <div class="market-grid" id="market"></div>

</section>

<script>
async function loadCatalog(){

  try{
    const res = await fetch("../data.json");
    const data = await res.json();
    const market = document.getElementById("market");

    Object.values(data.personnel).forEach(fp => {

      const card = document.createElement("div");
      card.className = "unit-card";

      card.innerHTML = `
        <div class="unit-img">
          <img src="${fp.profile}">
        </div>
        <div class="unit-overlay">
          <h3>${fp.name}</h3>
          <p>${fp.model || ""}</p>
        </div>
      `;

      card.onclick = ()=>{
        window.location.href = "Furru.html?id=" + fp.sn;
      };

      market.appendChild(card);
    });

  }catch(err){
    console.error(err);
  }
}

loadCatalog();

let allUnits = [];

async function loadCatalog(){

  try{
    const res = await fetch("data.json");
    const data = await res.json();

    allUnits = Object.values(data.personnel);
    renderUnits(allUnits);

  }catch(err){
    console.error(err);
  }
}

function renderUnits(units){

  const market = document.getElementById("market");
  market.innerHTML = "";

  units.forEach(fp => {

    const card = document.createElement("div");
    card.className = "unit-card";

    card.innerHTML = `
      <div class="unit-img">
        <img src="${fp.profile}">
      </div>
      <div class="unit-overlay">
        <h3>${fp.name}</h3>
        <p>${fp.subtitle} </p>
      </div>
    `;

    card.onclick = ()=>{
      window.location.href = "Furru.html?id=" + fp.sn;
    };

    market.appendChild(card);
  });
}

function filterUnits(){

  const keyword = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered = allUnits.filter(fp => 
    fp.name.toLowerCase().includes(keyword) ||
    fp.model.toLowerCase().includes(keyword) ||
    fp.sn.toLowerCase().includes(keyword)
  );

  renderUnits(filtered);
}
</script>

</body>
</html>
