<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP001 | IAF</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0f0f12;
  color:#fff;
}
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}
.hero img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.90);
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, #0f0f12 10%, transparent);
}
.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:60px;
}
.hero h1{
  font-size:56px;
  margin:0;
}
.hero p{
  color:#aaa;
  font-size:18px;
}
.section{
  padding:80px 60px;
  max-width:1000px;
  margin:auto;
}
h2{
  margin-bottom:20px;
  font-size:28px;
}
.card{
  background:#14141b;
  padding:24px;
  border-radius:16px;
  margin-top:20px;
  line-height:1.6;
  color:#bbb;
  white-space: pre-line;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* ===== OUTFIT ===== */
.outfit-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}
.outfit-card{
  background:#14141b;
  border-radius:16px;
  overflow:hidden;
}
.outfit-card img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
  transition:.3s;
  cursor:pointer;
}
.outfit-card:hover img{
  transform:scale(1.05);
}

/* ===== VIEWER ===== */
#viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#viewer img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}
#closeViewer{
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  cursor:pointer;
  color:white;
}

@media(max-width:800px){
  .section{padding:60px 25px;}
  .hero-content{padding:40px 25px;}
  .grid{grid-template-columns:1fr;}
  .hero h1{font-size:40px;}
  .hero img{object-position:50% center;}
}
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-direction:row-reverse;
  z-index:999;
  pointer-events:none;
}
.logo img{
  height:40px;
  opacity:.9;
  pointer-events:auto;
}
.back-btn{
  pointer-events:auto;
  text-decoration:none;
  color:#fff;
  background:rgba(20,20,27,.6);
  backdrop-filter:blur(6px);
  padding:10px 18px;
  border-radius:999px;
  font-size:14px;
  transition:.2s;
}
.back-btn:hover{
  background:rgba(255,255,255,.1);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="iaf-logo.png" alt="IAF Logo">
  </div>

  <a href="index.html" class="back-btn">
    ← Back to Catalog
  </a>
</div>

<!-- HERO -->
<section class="hero">
  <img src="" alt="">
  <div class="hero-content">
    <h1></h1>
    <p></p>
  </div>
</section>

<!-- OVERVIEW -->
<section class="section">
  <h2>desricption</h2>
  <div class="card" id="overview"></div>
</section>

<!-- SPEC -->
<section class="section">
  <h2>Specification</h2>
  <div class="grid" id="specs"></div>
</section>

<!-- OUTFIT -->
<section class="section">
  <h2>Outfit</h2>
  <div class="outfit-grid" id="outfits"></div>
</section>

<!-- VIEWER -->
<div id="viewer">
  <span id="closeViewer">&times;</span>
  <img id="viewerImg">
</div>

<script>

function generateDescription(fp){

  // ambil nomor unit dari SN (FP002 → 2)
  const unitNumber = parseInt(fp.sn.replace("FP","")) || "?";

  // ambil affiliation dari subtitle (ICT / EBS / SMC / dll)
  let affiliation = "";
  if(fp.subtitle){
    const parts = fp.subtitle.split("|");
    affiliation = parts[2]?.trim() || "";
  }

  return `${fp.name} adalah Furru ke-${unitNumber} dengan SN ${fp.sn} dan REG-ID ${fp.reg}

${fp.name.toLowerCase()} adalah ${fp.sex.toLowerCase()} ${fp.model} dengan tinggi badan ${fp.height_no_ears} cm tanpa kuping dan ${fp.height_with_ears} cm dengan kuping 

${fp.name} sudah aktif sejak ${fp.deploy} selain itu ${fp.name.toLowerCase()} juga terafiliasi dengan ${fp.role}`;
}
  
function getUnitID(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || "FP001";
}

async function loadFP(){

  const unitID = getUnitID();

  try {

    const response = await fetch("data.json");
    if (!response.ok) throw new Error("Fetch gagal");

    const data = await response.json();

    let fp = data?.personnel?.[unitID];

    if(!fp){
      console.warn("Unit tidak ditemukan, fallback ke FP001");
      fp = data?.personnel?.["FP001"];
    }

    updateHero(fp);
    updateOverview(fp);
    updateSpecs(fp);
    updateOutfits(fp);

  } catch (err) {
    console.error("Load error:", err);
  }
}

function updateHero(fp){
  const heroImg = document.querySelector(".hero img");
  const heroTitle = document.querySelector(".hero h1");
  const heroSub = document.querySelector(".hero p");

  heroImg.src = fp.profile || "";
  heroTitle.textContent = fp.name || "Unknown Unit";
  heroSub.textContent = fp.subtitle || "";

  document.title = (fp.sn || "Unit") + " | " + (fp.name || "Unit");
}

function updateOverview(fp){
  document.getElementById("overview").textContent =
    fp.description || generateDescription(fp);
}

function updateSpecs(fp){
  const specs = document.getElementById("specs");
  specs.innerHTML = "";

  const fields = [
    ["Base Model", fp.model],
    ["Sex", fp.sex],
    ["Height", formatCM(fp.height_no_ears)],
    ["Height with Ears", formatCM(fp.height_with_ears)],
    ["Deployment", fp.deploy],
    ["Role", fp.role]
  ];

  fields.forEach(([label,value])=>{
    if(!value) return;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<strong>${label}</strong><br>${value}`;
    specs.appendChild(card);
  });
}

function updateOutfits(fp){
  const container = document.getElementById("outfits");
  container.innerHTML = "";

  if(!fp.outfits) return;

  fp.outfits.forEach(src=>{
    const card = document.createElement("div");
    card.className = "outfit-card";

    const img = document.createElement("img");
    img.src = src;

    img.onclick = () => openViewer(src);

    card.appendChild(img);
    container.appendChild(card);
  });
}

function openViewer(src){
  document.getElementById("viewerImg").src = src;
  document.getElementById("viewer").style.display = "flex";
}

document.getElementById("closeViewer").onclick = () => {
  document.getElementById("viewer").style.display = "none";
};

document.getElementById("viewer").onclick = (e) => {
  if(e.target.id === "viewer"){
    document.getElementById("viewer").style.display = "none";
  }
};

function formatCM(val){
  return val ? `${val} cm` : null;
}

loadFP();

</script>
</body>
</html>
